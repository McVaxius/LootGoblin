# ==============================================================================
# COMMON OBJECTS (Used across ALL treasure map dungeons)
# ==============================================================================

CommonObjects:
  
  # Entry Portal (Overworld → Dungeon)
  EntryPortal:
    ObjectName: "Teleportation Portal"
    Purpose: "Portal that appears in overworld after opening treasure coffer"
    Verified: true
    Notes: "Already working in Phase 6. Appears after defeating overworld enemies and opening chest."
    WikiSource: "All dungeon pages"
  
  # Treasure Coffer (Inside Dungeon)
  TreasureCoffer:
    ObjectName: "Treasure Coffer"
    Purpose: "Main loot chest in each dungeon room, triggers trap when opened"
    Verified: true
    Notes: "Already working in Phase 6. Armed with traps that release enemies."
    WikiSource: "All dungeon pages"
    Mechanics: "Opening triggers trap → enemies spawn → defeat enemies → open chest for rewards + Vault Key"
  
  # Vault Key
  VaultKey:
    ObjectName: "Vault Key"
    Purpose: "Key obtained from treasure coffer, used to open one of the locked doors"
    Verified: false
    Notes: "Item obtained after opening treasure coffer. Used to unlock progression doors."
    WikiSource: "Aquapolis, Lost Canals, Lyhe Ghiah, Excitatron"
  
  # Locked Doors (Progression)
  LockedDoors:
    ObjectName: "RESEARCH_NEEDED"
    Purpose: "Two locked doors per room, one leads to next floor, one kicks you out"
    Verified: false
    Notes: "NOT 'Passage' or 'Cairn of Passage' (Deep Dungeon). Need actual object name from treasure dungeons."
    WikiSource: "All dungeon pages mention 'two doors' or 'two locked doors'"
    Mechanics: "50% chance per door (regular dungeons) or 33.33% chance (Hidden Canals with 3 doors)"
    GoodLuckDoor: "Rainbow arrows or flashing colors indicate correct door (guaranteed success)"
  
  # Exit Portal (Dungeon → Overworld)
  ExitPortal:
    ObjectName: "RESEARCH_NEEDED"
    Purpose: "Portal to voluntarily exit dungeon back to overworld"
    Verified: false
    Notes: "NOT 'Accursed Hoard' (Deep Dungeon). Need actual object name from treasure dungeons."
    WikiSource: "Not explicitly mentioned in wiki - may not exist as separate object"
  
  # Bonus Enemies (Extra Loot)
  BonusEnemies:
    - ObjectName: "Arges"
      Purpose: "Rare bonus enemy that drops extra rewards"
      Verified: false
      Notes: "Can spawn multiple times (up to 2 at once)"
      WikiSource: "Aquapolis"
    
    - ObjectName: "Golden Goblin"
      Purpose: "Rare bonus enemy that drops extra rewards"
      Verified: false
      Notes: "Can spawn multiple times (up to 3 at once)"
      WikiSource: "Aquapolis"
    
    - ObjectName: "Gymnasiou Lampas"
      Purpose: "Rare bonus enemy in Gymnasion Agonon"
      Verified: false
      WikiSource: "Shifting Gymnasion Agonon"
    
    - ObjectName: "Gymnasiou Lyssa"
      Purpose: "Rare bonus enemy in Gymnasion Agonon"
      Verified: false
      WikiSource: "Shifting Gymnasion Agonon"

